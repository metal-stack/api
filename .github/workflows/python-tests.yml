name: python-tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.71.0"

      - name: Generate protobuf Python code (including buf/validate)
        run: |
          cd proto
          buf generate

      - name: Install test dependencies
        run: |
          pip install connectrpc>=0.10.0 protovalidate werkzeug pytest

      - name: Run Python client tests
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE/python" python -m pytest python/metalstack/client/tests/ -v
