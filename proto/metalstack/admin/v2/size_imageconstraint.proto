syntax = "proto3";

package metalstack.admin.v2;

import "buf/validate/validate.proto";
import "metalstack/api/v2/common.proto";
import "metalstack/api/v2/predefined_rules.proto";
import "metalstack/api/v2/size_imageconstraint.proto";

// SizeImageConstraintService serves size and image constraint related functions
service SizeImageConstraintService {
  // Create a size image constraint
  rpc Create(SizeImageConstraintServiceCreateRequest) returns (SizeImageConstraintServiceCreateResponse) {
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_EDITOR;
    option (metalstack.api.v2.auditing) = AUDITING_EXCLUDED;
  }
  // Update a size image constraint
  rpc Update(SizeImageConstraintServiceUpdateRequest) returns (SizeImageConstraintServiceUpdateResponse) {
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_EDITOR;
    option (metalstack.api.v2.auditing) = AUDITING_EXCLUDED;
  }
  // Delete a size image constraint
  rpc Delete(SizeImageConstraintServiceDeleteRequest) returns (SizeImageConstraintServiceDeleteResponse) {
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_EDITOR;
    option (metalstack.api.v2.auditing) = AUDITING_EXCLUDED;
  }
  // Get a size image constraint
  rpc Get(SizeImageConstraintServiceGetRequest) returns (SizeImageConstraintServiceGetResponse) {
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_EDITOR;
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_VIEWER;
    option (metalstack.api.v2.auditing) = AUDITING_EXCLUDED;
  }
  // List a size image constraint
  rpc List(SizeImageConstraintServiceListRequest) returns (SizeImageConstraintServiceListResponse) {
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_EDITOR;
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_VIEWER;
    option (metalstack.api.v2.auditing) = AUDITING_EXCLUDED;
  }
}

// SizeImageConstraintServiceCreateRequest is the request payload for a size image constraint create request
message SizeImageConstraintServiceCreateRequest {
  // Id of the size
  string size = 1 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
  // ImageConstraints to apply to this size
  repeated metalstack.api.v2.ImageConstraint image_constraints = 2;
  // Meta for this size image constraint
  metalstack.api.v2.Meta meta = 3;
  // Name of this size image constraint
  optional string name = 4 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
  // Description of this size image constraint
  optional string description = 5 [(buf.validate.field).string.(metalstack.api.v2.is_description) = true];
}

// SizeImageConstraintServiceCreateResponse is the response payload for a size image constraint create request
message SizeImageConstraintServiceCreateResponse {
  // SizeImageConstraint created
  metalstack.api.v2.SizeImageConstraint size_image_constraint = 1;
}

// SizeImageConstraintServiceUpdateRequest is the request payload for a size image constraint update request
message SizeImageConstraintServiceUpdateRequest {
  // Id of the size
  string size = 1 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
  // UpdateMeta contains the timestamp and strategy to be used in this update request
  metalstack.api.v2.UpdateMeta update_meta = 2 [(buf.validate.field).required = true];
  // ImageConstraints to apply to this size
  repeated metalstack.api.v2.ImageConstraint image_constraints = 3;
  // Name of this size image constraint
  optional string name = 4 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
  // Description of this size image constraint
  optional string description = 5 [(buf.validate.field).string.(metalstack.api.v2.is_description) = true];
}

// SizeImageConstraintServiceUpdateResponse is the response payload for a size image constraint update request
message SizeImageConstraintServiceUpdateResponse {
  // SizeImageConstraint updated
  metalstack.api.v2.SizeImageConstraint size_image_constraint = 1;
}

// SizeImageConstraintServiceDeleteRequest is the request payload for a size image constraint delete request
message SizeImageConstraintServiceDeleteRequest {
  // Id of the size
  string size = 1 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
}

// SizeImageConstraintServiceDeleteResponse is the response payload for a size image constraint delete request
message SizeImageConstraintServiceDeleteResponse {
  // SizeImageConstraint deleted
  metalstack.api.v2.SizeImageConstraint size_image_constraint = 1;
}

// SizeImageConstraintServiceGetRequest is the request payload for a size image constraint get request
message SizeImageConstraintServiceGetRequest {
  // Id of the size to get
  string size = 1 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
}

// SizeImageConstraintServiceGetResponse is the response payload for a size image constraint get request
message SizeImageConstraintServiceGetResponse {
  // SizeImageConstraint get
  metalstack.api.v2.SizeImageConstraint size_image_constraint = 1;
}

// SizeImageConstraintServiceListRequest is the request payload for a size image constraint list request
message SizeImageConstraintServiceListRequest {
  // Query for size image constraints
  metalstack.api.v2.SizeImageConstraintQuery query = 1;
}

// SizeImageConstraintServiceListResponse is the response payload for a size image constraint list request
message SizeImageConstraintServiceListResponse {
  // SizeImageConstraints listed
  repeated metalstack.api.v2.SizeImageConstraint size_image_constraints = 1;
}
