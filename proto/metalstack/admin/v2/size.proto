syntax = "proto3";

package metalstack.admin.v2;

import "buf/validate/validate.proto";
import "metalstack/api/v2/common.proto";
import "metalstack/api/v2/predefined_rules.proto";
import "metalstack/api/v2/size.proto";

// SizeService provides size management operations.
service SizeService {
  // Creates a new size.
  rpc Create(SizeServiceCreateRequest) returns (SizeServiceCreateResponse) {
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_EDITOR;
  }
  // Updates a size.
  rpc Update(SizeServiceUpdateRequest) returns (SizeServiceUpdateResponse) {
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_EDITOR;
  }
  // Deletes a size.
  rpc Delete(SizeServiceDeleteRequest) returns (SizeServiceDeleteResponse) {
    option (metalstack.api.v2.admin_roles) = ADMIN_ROLE_EDITOR;
  }
}

// SizeServiceCreateRequest is the request payload for creating a size.
message SizeServiceCreateRequest {
  // Size is the size to create
  metalstack.api.v2.Size size = 1;
}

// SizeServiceCreateResponse is the response payload for creating a size.
message SizeServiceCreateResponse {
  // Size contains the created size
  metalstack.api.v2.Size size = 1;
}

// SizeServiceUpdateRequest is the request payload for updating a size.
message SizeServiceUpdateRequest {
  // Id of this size
  string id = 1 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
  // UpdateMeta contains the timestamp and strategy to be used in this update request
  metalstack.api.v2.UpdateMeta update_meta = 2 [(buf.validate.field).required = true];
  // Name of this size
  optional string name = 3 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
  // Description of this size
  optional string description = 4 [(buf.validate.field).string.(metalstack.api.v2.is_description) = true];
  // Constraints which must match that a specific machine is considered of this size
  repeated metalstack.api.v2.SizeConstraint constraints = 5;
  // Labels to update on this size
  optional metalstack.api.v2.UpdateLabels labels = 6;
}

// SizeServiceUpdateResponse is the response payload for updating a size.
message SizeServiceUpdateResponse {
  // Size contains the updated size
  metalstack.api.v2.Size size = 1;
}

// SizeServiceDeleteRequest is the request payload for deleting a size.
message SizeServiceDeleteRequest {
  // ID of the size to delete
  string id = 1 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
}

// SizeServiceDeleteResponse is the response payload for deleting a size.
message SizeServiceDeleteResponse {
  // Size contains the deleted size
  metalstack.api.v2.Size size = 1;
}
