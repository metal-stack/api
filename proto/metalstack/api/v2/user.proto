syntax = "proto3";

package metalstack.api.v2;

import "buf/validate/validate.proto";
import "metalstack/api/v2/common.proto";
import "metalstack/api/v2/predefined_rules.proto";
import "metalstack/api/v2/project.proto";
import "metalstack/api/v2/tenant.proto";

// UserService provides user information operations.
service UserService {
  // Returns the authenticated user.
  rpc Get(UserServiceGetRequest) returns (UserServiceGetResponse) {
    option (visibility) = VISIBILITY_SELF;
    option (auditing) = AUDITING_INCLUDED;
  }
}

// User represents an end user of the platform.
message User {
  // Login is the login at the provider
  string login = 1 [(buf.validate.field).string.(metalstack.api.v2.is_tenant_login) = true];
  // Name of the user
  string name = 2 [(buf.validate.field).string.(metalstack.api.v2.is_name) = true];
  // Email of the user
  string email = 3 [(buf.validate.field).string.email = true];
  // AvatarUrl of the user
  string avatar_url = 4 [(buf.validate.field).string.(metalstack.api.v2.is_uri) = true];
  // Tenants the user belongs to
  repeated Tenant tenants = 5;
  // Projects the user belongs to
  repeated Project projects = 6;
  // DefaultTenant the default tenant that this user belongs to
  Tenant default_tenant = 7;
}

// UserServiceGetRequest is the request payload for getting the user.
message UserServiceGetRequest {}

// UserServiceGetResponse is the response payload for getting the user.
message UserServiceGetResponse {
  // User contains the authenticated user
  User user = 1;
}
